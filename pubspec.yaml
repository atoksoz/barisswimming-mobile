#Note: Splash screen ikonu değiştirilecekse 800x800 bir kutunun içerisine logo yetleştirilmelidir, kenarlarda boşluk kalmalı.
#Referans olarak facebook, instagram vb. uygulamaların logoları test edilebilir.
#Yeni bir splash screen oluşturulacağı zaman aşağıdaki kod bloğu sırasıyla çalışıtırlmalı.
#flutter clean
#flutter pub get
#flutter pub run flutter_native_splash:remove
#flutter pub run flutter_native_splash:create
flutter_native_splash:
  color: "#FFFFFF"
  image: assets/images/splash-screen/splash-screen-logo.png
  android: true
  ios: true
  android_12:
    image: assets/images/splash-screen/splash-screen-logo.png
    icon_background_color: "#FFFFFF"
    image_dark: assets/images/splash-screen/splash-screen-logo.png
    icon_background_color_dark: "#FFFFFF"
  web: false
